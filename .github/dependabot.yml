version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 10
    reviewers:
      - 'shenjingnan'
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'chore'
      include: 'scope'
    groups:
      dev-dependencies:
        patterns:
          - '@biomejs/*'
          - '@types/*'
          - '@vitest/*'
          - 'vitest'
          - 'typescript'
          - 'tsdown'
          - 'tsx'
        update-types:
          - 'minor'
          - 'patch'
      lint-tools:
        patterns:
          - 'cspell'
          - 'husky'
          - 'lint-staged'
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 5
    labels:
      - 'ci'
      - 'dependencies'
    commit-message:
      prefix: 'ci'
      include: 'scope'