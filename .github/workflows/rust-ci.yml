name: Rust CI

on:
  push:
    branches: [main, 'feature/rust-rewrite']
    paths: ['Cargo.toml', 'Cargo.lock', 'src/**/*.rs', 'tests/**']
  pull_request:
    branches: [main]
    paths: ['Cargo.toml', 'Cargo.lock', 'src/**/*.rs', 'tests/**']

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: 代码质量检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: 格式检查
        run: cargo fmt --check

      - name: Lint 检查
        run: cargo clippy -- -D warnings

      - name: 测试
        run: cargo test -- --test-threads=1

      - name: 构建
        run: cargo build --release

  test-macos:
    name: 测试 (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 测试
        run: cargo test -- --test-threads=1

  test-windows:
    name: 测试 (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 测试
        run: cargo test -- --test-threads=1
