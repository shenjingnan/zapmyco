name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        deno-version: [2.x]

    steps:
      - name: 检出代码仓库
        uses: actions/checkout@v6

      - name: 设置 Deno ${{ matrix.deno-version }}
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ matrix.deno-version }}

      - name: 代码检查
        run: deno lint

      - name: 格式检查
        run: deno fmt --check

      - name: 类型检查
        run: deno check src/

      - name: 测试
        run: deno test

      - name: 覆盖率报告
        run: deno test --coverage=coverage && deno coverage --lcov coverage > coverage/lcov.info

      - name: 上传覆盖率到 Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
