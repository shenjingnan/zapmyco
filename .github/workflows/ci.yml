name: CI

on:
  push:
    branches: [main, 'feature/rust-rewrite']
    paths: ['Cargo.toml', 'Cargo.lock', 'src/**/*.rs', 'tests/**']
  pull_request:
    branches: [main]
    paths: ['Cargo.toml', 'Cargo.lock', 'src/**/*.rs', 'tests/**']

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  check:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Ensure components for project toolchain
        # rust-toolchain.toml 会覆盖工具链名称（如 1.95-x86_64-unknown-linux-gnu），
        # 导致 dtolnay action 安装的组件对实际使用的工具链不可见，需要显式安装。
        run: rustup component add rustfmt clippy

      - name: Format check
        run: cargo fmt --check

      - name: Lint check
        run: cargo clippy -- -D warnings

      - name: Install typos-cli
        uses: taiki-e/install-action@v2
        with:
          tool: typos-cli

      - name: Spell check
        run: typos .

      - name: Tests
        # --jobs 1: 防止 lib 测试和集成测试并行修改 HOME 导致竞态
        run: cargo test --jobs 1 -- --test-threads=1

      - name: Build
        run: cargo build --release

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin

      - name: Generate coverage report
        run: cargo tarpaulin --out lcov --output-dir coverage -- --test-threads=1

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  test:
    name: Test (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Tests
        # --jobs 1: 防止 lib 测试和集成测试并行修改 HOME 导致竞态
        run: cargo test --jobs 1 -- --test-threads=1
