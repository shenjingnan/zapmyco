name: Release

on:
  release:
    types: [published]

jobs:
  publish-jsr:
    name: 发布到 JSR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: 检出代码仓库
        uses: actions/checkout@v6

      - name: 设置 Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.x

      - name: 发布到 JSR
        run: deno publish

  publish-npm:
    name: 发布到 npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: 检出代码仓库
        uses: actions/checkout@v6

      - name: 设置 Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.x

      - name: dnt 构建 npm 包
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: deno run -A tools/build-npm.ts "${TAG_NAME#v}"

      - name: 设置 pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: 设置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: 发布到 npm（Trusted Publishing）
        env:
          NODE_AUTH_TOKEN: ''
        run: |
          cd dist/npm
          if echo "${{ github.event.release.tag_name }}" | grep -q '-'; then
            TAG=$(echo "${{ github.event.release.tag_name }}" | sed 's/.*-\([a-z]*\).*/\1/')
            pnpm publish --no-git-checks --provenance --access public --tag "$TAG"
          else
            pnpm publish --no-git-checks --provenance --access public
          fi

  build-binaries:
    name: 构建二进制 (${{ matrix.output }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compile-target: '--target x86_64-unknown-linux-gnu'
            output: zapmyco-linux-x64
          - os: ubuntu-latest
            compile-target: '--target aarch64-unknown-linux-gnu'
            output: zapmyco-linux-arm64
          - os: macos-latest
            compile-target: ''
            output: zapmyco-macos-arm64
          - os: macos-latest
            compile-target: '--target x86_64-apple-darwin'
            output: zapmyco-macos-x64
          - os: windows-latest
            compile-target: ''
            output: zapmyco-windows-x64.exe

    steps:
      - uses: actions/checkout@v6

      - uses: denoland/setup-deno@v2
        with:
          deno-version: 2.x

      - name: 安装 UPX (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y upx

      - name: 安装交叉编译工具 (ARM64)
        if: matrix.compile-target == '--target aarch64-unknown-linux-gnu'
        run: sudo apt-get install -y binutils-aarch64-linux-gnu

      - name: 安装 UPX (macOS)
        if: runner.os == 'macOS'
        run: brew install upx

      - name: 安装 UPX (Windows)
        if: runner.os == 'Windows'
        run: choco install upx

      - name: 编译二进制文件
        run: deno compile --no-check --allow-env --allow-net ${{ matrix.compile-target }} --output ${{ matrix.output }} src/index.ts

      - name: 压缩二进制 (Linux)
        if: runner.os == 'Linux'
        run: |
          if [ "${{ matrix.compile-target }}" = "--target aarch64-unknown-linux-gnu" ]; then
            aarch64-linux-gnu-strip ${{ matrix.output }}
          else
            strip ${{ matrix.output }}
          fi
          upx --best --lzma ${{ matrix.output }}

      - name: 压缩二进制 (macOS)
        if: runner.os == 'macOS'
        run: upx --best --lzma --force-macos ${{ matrix.output }}

      - name: 压缩二进制 (Windows)
        if: runner.os == 'Windows'
        run: upx --best --lzma ${{ matrix.output }}

      - name: 计算 SHA256
        shell: bash
        run: shasum -a 256 ${{ matrix.output }} > checksums-${{ matrix.output }}.txt

      - name: 上传 checksum 文件
        uses: actions/upload-artifact@v4
        with:
          name: checksums-${{ matrix.output }}
          path: checksums-${{ matrix.output }}.txt
          retention-days: 1

      - name: 上传到 Release
        run: gh release upload ${{ github.event.release.tag_name }} "${{ matrix.output }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  generate-checksums:
    name: 生成 SHA256SUMS
    runs-on: ubuntu-latest
    needs: [build-binaries]
    permissions:
      contents: write
    steps:
      - name: 下载所有 checksum 文件
        uses: actions/download-artifact@v4
        with:
          pattern: checksums-*
          merge-multiple: true

      - name: 合并为 SHA256SUMS
        run: cat *.txt | sort > SHA256SUMS

      - name: 上传 SHA256SUMS 到 Release
        run: gh release upload ${{ github.event.release.tag_name }} SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
