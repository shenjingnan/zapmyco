name: Release

on:
  release:
    types: [published]

jobs:
  publish-jsr:
    name: 发布到 JSR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: 检出代码仓库
        uses: actions/checkout@v6

      - name: 设置 Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.x

      - name: 发布到 JSR
        run: deno publish

  publish-npm:
    name: 发布到 npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: 检出代码仓库
        uses: actions/checkout@v6

      - name: 设置 Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 2.x

      - name: dnt 构建 npm 包
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: deno run -A tools/build-npm.ts "${TAG_NAME#v}"

      - name: 设置 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: 设置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: 发布到 npm（Trusted Publishing）
        env:
          NODE_AUTH_TOKEN: ''
        run: |
          cd dist/npm
          if echo "${{ github.event.release.tag_name }}" | grep -q '-'; then
            TAG=$(echo "${{ github.event.release.tag_name }}" | sed 's/.*-\([a-z]*\).*/\1/')
            pnpm publish --no-git-checks --provenance --access public --tag "$TAG"
          else
            pnpm publish --no-git-checks --provenance --access public
          fi
