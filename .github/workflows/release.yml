name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # Job 1: 创建 Release PR（由 release-plz 根据 commits 自动计算版本号）
  release-plz-pr:
    name: 创建 Release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 运行 release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 2: 发布到 crates.io + 创建 GitHub Release
  publish:
    name: 发布到 crates.io
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    outputs:
      tag_name: ${{ steps.get-tag.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 记录当前最新 tag
        id: pre-tag
        run: echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"

      - name: 运行 release-plz
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 检测新 tag
        id: get-tag
        run: |
          NEW_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo '')
          PRE_TAG="${{ steps.pre-tag.outputs.tag }}"
          if [ -n "$NEW_TAG" ] && [ "$NEW_TAG" != "$PRE_TAG" ]; then
            echo "tag_name=$NEW_TAG" >> "$GITHUB_OUTPUT"
            echo "检测到新版本: $NEW_TAG"
          else
            echo "tag_name=" >> "$GITHUB_OUTPUT"
            echo "无新版本发布"
          fi

  # Job 3: 构建多平台二进制（仅当有新 release 时执行）
  build-binaries:
    name: 构建二进制 (${{ matrix.output }})
    needs: publish
    if: needs.publish.outputs.tag_name != ''
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            output: zapmyco-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            output: zapmyco-linux-arm64
          - os: macos-latest
            target: aarch64-apple-darwin
            output: zapmyco-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            output: zapmyco-macos-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            output: zapmyco-windows-x64.exe

    steps:
      - uses: actions/checkout@v6

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 安装交叉编译工具 (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: 构建
        run: cargo build --release --target ${{ matrix.target }}

      - name: 压缩二进制 (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          strip target/${{ matrix.target }}/release/zapmyco
          cp target/${{ matrix.target }}/release/zapmyco ${{ matrix.output }}

      - name: 压缩二进制 (Windows)
        if: runner.os == 'Windows'
        run: copy target\${{ matrix.target }}\release\zapmyco.exe ${{ matrix.output }}

      - name: 计算 SHA256
        shell: bash
        run: |
          if command -v sha256sum &> /dev/null; then
            sha256sum ${{ matrix.output }} > checksums-${{ matrix.output }}.txt
          else
            shasum -a 256 ${{ matrix.output }} > checksums-${{ matrix.output }}.txt
          fi

      - name: 上传 checksum
        uses: actions/upload-artifact@v7
        with:
          name: checksums-${{ matrix.output }}
          path: checksums-${{ matrix.output }}.txt
          retention-days: 1

      - name: 上传二进制到 Release
        env:
          TAG: ${{ needs.publish.outputs.tag_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$TAG" "${{ matrix.output }}"

  # Job 4: 生成合并的 SHA256SUMS（在所有二进制构建完成后）
  generate-checksums:
    name: 生成 SHA256SUMS
    runs-on: ubuntu-latest
    needs: [publish, build-binaries]
    if: needs.publish.outputs.tag_name != ''
    permissions:
      contents: write
    steps:
      - name: 下载所有 checksum 文件
        uses: actions/download-artifact@v8
        with:
          pattern: checksums-*
          merge-multiple: true

      - name: 合并为 SHA256SUMS
        run: cat *.txt | sort > SHA256SUMS

      - name: 上传 SHA256SUMS 到 Release
        env:
          TAG: ${{ needs.publish.outputs.tag_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$TAG" SHA256SUMS
