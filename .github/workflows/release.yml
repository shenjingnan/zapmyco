name: Release

on:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  # Job 2: 创建/更新 Release PR（在 publish 之后执行，确保 tag 已创建）
  release-plz-pr:
    needs: [publish]
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    name: 创建/更新 Release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 运行 release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 1: 发布到 crates.io + 创建 GitHub Release
  publish:
    name: 发布到 crates.io
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: read
    outputs:
      tag_name: ${{ steps.get-tag.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 记录当前最新 tag
        id: pre-tag
        run: echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || echo '')" >> "$GITHUB_OUTPUT"

      - name: 运行 release-plz
        id: release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 检测新 tag
        id: get-tag
        run: |
          RELEASES='${{ steps.release.outputs.releases }}'
          if [ -n "$RELEASES" ] && [ "$RELEASES" != "[]" ] && [ "$RELEASES" != "null" ]; then
            TAG=$(echo "$RELEASES" | jq -r '.[0].tag // empty')
            if [ -n "$TAG" ]; then
              echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"
              echo "检测到新版本: $TAG"
            else
              echo "tag_name=" >> "$GITHUB_OUTPUT"
              echo "无新版本发布"
            fi
          else
            echo "tag_name=" >> "$GITHUB_OUTPUT"
            echo "无新版本发布"
          fi

  # Job 3: 构建多平台二进制（仅当有新 release 时执行）
  build-binaries:
    name: 构建二进制 (${{ matrix.output }})
    needs: publish
    if: needs.publish.outputs.tag_name != ''
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            output: zapmyco-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            output: zapmyco-linux-arm64
          - os: macos-latest
            target: aarch64-apple-darwin
            output: zapmyco-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            output: zapmyco-macos-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            output: zapmyco-windows-x64.exe

    steps:
      - uses: actions/checkout@v6

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 安装交叉编译工具 (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo dpkg --add-architecture arm64
          # 限制默认 apt 源只使用 amd64（避免添加 arm64 架构后它们也尝试获取 arm64 包导致 404）
          sudo find /etc/apt/sources.list.d/ -name '*.sources' -exec sed -i '/^Types: deb$/a\Architectures: amd64' {} \;
          sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list 2>/dev/null || true
          # Ubuntu Ports 是官方 ARM64 源
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main universe" | sudo tee /etc/apt/sources.list.d/arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main universe" | sudo tee -a /etc/apt/sources.list.d/arm64.list
          sudo apt-get update -qq
          sudo apt-get install -y gcc-aarch64-linux-gnu libssl-dev:arm64 pkg-config
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV

      - name: 构建
        run: cargo build --release --target ${{ matrix.target }}

      - name: 压缩二进制 (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          if [ '${{ matrix.target }}' = 'aarch64-unknown-linux-gnu' ]; then
            STRIP=aarch64-linux-gnu-strip
          else
            STRIP=strip
          fi
          $STRIP target/${{ matrix.target }}/release/zapmyco
          cp target/${{ matrix.target }}/release/zapmyco ${{ matrix.output }}

      - name: 压缩二进制 (Windows)
        if: runner.os == 'Windows'
        run: copy target\${{ matrix.target }}\release\zapmyco.exe ${{ matrix.output }}

      - name: 计算 SHA256
        shell: bash
        run: |
          if command -v sha256sum &> /dev/null; then
            sha256sum ${{ matrix.output }} > checksums-${{ matrix.output }}.txt
          else
            shasum -a 256 ${{ matrix.output }} > checksums-${{ matrix.output }}.txt
          fi

      - name: 上传 checksum
        uses: actions/upload-artifact@v7
        with:
          name: checksums-${{ matrix.output }}
          path: checksums-${{ matrix.output }}.txt
          retention-days: 1

      - name: 上传二进制到 Release
        shell: bash
        env:
          TAG: ${{ needs.publish.outputs.tag_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in 1 2 3; do
            gh release upload "$TAG" "${{ matrix.output }}" && break
            echo "上传失败（尝试 $i/3），等待 5 秒后重试..."
            sleep 5
          done

  # Job 4: 生成合并的 SHA256SUMS（在所有二进制构建完成后）
  generate-checksums:
    name: 生成 SHA256SUMS
    runs-on: ubuntu-latest
    needs: [publish, build-binaries]
    if: needs.publish.outputs.tag_name != ''
    permissions:
      contents: write
    steps:
      - name: 下载所有 checksum 文件
        uses: actions/download-artifact@v8
        with:
          pattern: checksums-*
          merge-multiple: true

      - name: 合并为 SHA256SUMS
        run: cat *.txt | sort > SHA256SUMS

      - name: 上传 SHA256SUMS 到 Release
        env:
          TAG: ${{ needs.publish.outputs.tag_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$TAG" SHA256SUMS
