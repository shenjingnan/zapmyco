name: Build Binaries

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-binaries:
    name: 构建二进制
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            output: zapmyco-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            output: zapmyco-linux-arm64
          - os: macos-latest
            target: aarch64-apple-darwin
            output: zapmyco-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            output: zapmyco-macos-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            output: zapmyco-windows-x64.exe

    steps:
      - uses: actions/checkout@v6

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 安装交叉编译工具 (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: 构建
        run: cargo build --release --target ${{ matrix.target }}

      - name: 压缩二进制 (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          strip target/${{ matrix.target }}/release/zapmyco
          cp target/${{ matrix.target }}/release/zapmyco ${{ matrix.output }}

      - name: 压缩二进制 (Windows)
        if: runner.os == 'Windows'
        run: copy target\${{ matrix.target }}\release\zapmyco.exe ${{ matrix.output }}

      - name: 计算 SHA256
        shell: bash
        run: |
          if command -v sha256sum &> /dev/null; then
            sha256sum ${{ matrix.output }} > checksums-${{ matrix.output }}.txt
          else
            shasum -a 256 ${{ matrix.output }} > checksums-${{ matrix.output }}.txt
          fi

      - name: 上传 checksum
        uses: actions/upload-artifact@v7
        with:
          name: checksums-${{ matrix.output }}
          path: checksums-${{ matrix.output }}.txt
          retention-days: 1

      - name: 上传二进制到 Release
        env:
          TAG: ${{ github.event.release.tag_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$TAG" "${{ matrix.output }}"

  generate-checksums:
    name: 生成 SHA256SUMS
    runs-on: ubuntu-latest
    needs: [build-binaries]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: 下载所有 checksum 文件
        uses: actions/download-artifact@v8
        with:
          pattern: checksums-*
          merge-multiple: true

      - name: 合并为 SHA256SUMS
        run: cat *.txt | sort > SHA256SUMS

      - name: 上传 SHA256SUMS 到 Release
        env:
          TAG: ${{ github.event.release.tag_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$TAG" SHA256SUMS
