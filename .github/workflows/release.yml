name: Release

# 注意：此文件名为 release.yml 是因为 crates.io trusted publishing
# 要求 workflow 文件名必须与此匹配。请勿更改文件名。

on:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  # Job 1: 发布到 crates.io + 创建 git tag
  publish:
    name: 发布到 crates.io
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: read
    outputs:
      tag_name: ${{ steps.get-tag.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 运行 release-plz（创建 tag + 发布到 crates.io）
        id: release
        uses: release-plz/action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 检测新 tag
        id: get-tag
        run: |
          RELEASES='${{ steps.release.outputs.releases }}'
          if [ -n "$RELEASES" ] && [ "$RELEASES" != "[]" ] && [ "$RELEASES" != "null" ]; then
            TAG=$(echo "$RELEASES" | jq -r '.[0].tag // empty')
            if [ -n "$TAG" ]; then
              echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"
              echo "检测到新版本: $TAG"
            else
              echo "tag_name=" >> "$GITHUB_OUTPUT"
              echo "无新版本发布"
            fi
          else
            echo "tag_name=" >> "$GITHUB_OUTPUT"
            echo "无新版本发布"
          fi

  # Job 2: 触发 cargo-dist 构建多平台二进制
  trigger-dist:
    name: 触发 cargo-dist 构建
    needs: publish
    if: needs.publish.outputs.tag_name != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: 触发 cargo-dist 发布工作流
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.publish.outputs.tag_name }}
        run: |
          echo "触发 cargo-dist 构建版本: $TAG"
          gh workflow run dist.yml -f tag="$TAG" --ref "$TAG"

  # Job 3: 创建/更新 Release PR（准备下一个版本）
  release-plz-pr:
    needs: publish
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    name: 创建/更新 Release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 运行 release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
