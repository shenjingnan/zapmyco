[workspace]
changelog_update = true
changelog_path = "CHANGELOG.md"

# release-plz 负责创建 git tag 和发布到 crates.io
# cargo-dist 接管 GitHub Release 创建、二进制构建和安装脚本生成
git_release_enable = false
git_tag_enable = true
git_tag_name = "v{{ version }}"

# 允许 release-plz 触发下游 workflow（如 cargo-dist）
# 注意：需要在 release-plz.yml 中使用 PAT 或 GitHub App Token
git_push_extra_args = ["--follow-tags"]
